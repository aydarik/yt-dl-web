<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT-DL Web Service</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <h1>YT-DL Service</h1>
        <p>Download your favorite videos directly to your device.</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search by name or paste YouTube URL...">
    </div>

    <div id="loader" class="loader"></div>

    <div id="resultsGrid" class="results-grid">
        <!-- Results will be injected here -->
    </div>
</div>

<!-- Details Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div id="loaderModal" class="loader"></div>
        <div id="videoPlayerContainer" class="video-player-container" style="display: none;">
            <video id="videoPlayer" controls width="100%"></video>
        </div>
        <div id="cacheActions" class="format-list" style="text-align: center; margin-top: 1rem;">
            <div id="progressContainer" style="display: none; text-align: left; margin: 1rem 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span id="progress"></span>
                    <span id="progressText"></span>
                </div>
                <div style="background: #2a2a2a; border-radius: 4px; overflow: hidden; height: 10px;">
                    <div id="progressBar" style="background: #3EA6FF; height: 100%; width: 0%; transition: width 0.3s;"></div>
                </div>
            </div>
            <button id="downloadBtn" class="download-btn" style="display: none;">Download</button>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
